name: Auto Review on PR

on:
  pull_request:
    branches: [main]

jobs:
  build-and-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: npm run build
        continue-on-error: true

      - name: Get changed files
        id: changed
        if: steps.build.outcome == 'success'
        run: |
          FILES=$(git diff --name-only origin/main...HEAD | head -30 | sed 's/^/- /' | tr '\n' '\n')
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post success comment
        if: steps.build.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const files = `${{ steps.changed.outputs.files }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Build passed — ready to merge\n\n**Changed files:**\n${files}`
            });

      - name: Get build error
        id: error
        if: steps.build.outcome == 'failure'
        run: |
          ERROR=$(npm run build 2>&1 | tail -50 || true)
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$ERROR" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post failure comment
        if: steps.build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const error = `${{ steps.error.outputs.message }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Build failed\n\n\`\`\`\n${error}\n\`\`\``
            });
